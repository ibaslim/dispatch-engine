services:
  # ── Init (generates .env.local before anything starts) ───────────────────

  init:
    image: alpine:3.19
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ ! -f /workspace/.env.local ]; then
          cp /workspace/.env.local.example /workspace/.env.local
          JWT_SECRET=$$(cat /dev/urandom | tr -dc 'a-f0-9' | head -c 64)
          sed -i "s|changeme-generate-a-secure-random-string|$$JWT_SECRET|" /workspace/.env.local
          echo "✅ Created .env.local with auto-generated JWT_SECRET_KEY"
        else
          echo "✅ .env.local already exists – skipping."
        fi
    volumes:
      - ../../:/workspace

  # ── Data stores ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dispatch
      POSTGRES_PASSWORD: dispatch
      POSTGRES_DB: dispatch_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatch -d dispatch_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Mail (local/stage only) ───────────────────────────────────────────────

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 1000
      MP_DATA_FILE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    volumes:
      - mailpit_data:/data

  # ── API & workers ─────────────────────────────────────────────────────────

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://dispatch:dispatch@postgres:5432/dispatch_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      PLATFORM_ADMIN_EMAIL: admin@dispatch.local
      PLATFORM_ADMIN_PASSWORD: Admin123!
      PLATFORM_ADMIN_NAME: Platform Admin
    ports:
      - "8000:8000"
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app
      - ../../:/workspace
    command: >
      sh -c "
        cp /workspace/.env.local /app/.env &&
        pip install -r requirements.txt &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  celery-worker:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://dispatch:dispatch@postgres:5432/dispatch_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      PLATFORM_ADMIN_EMAIL: admin@dispatch.local
      PLATFORM_ADMIN_PASSWORD: Admin123!
      PLATFORM_ADMIN_NAME: Platform Admin
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app
      - ../../:/workspace
    command: >
      sh -c "
        cp /workspace/.env.local /app/.env &&
        pip install -r requirements.txt &&
        celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
      "

  node-deps:
    image: node:20-alpine
    working_dir: /workspace
    restart: "no"
    volumes:
      - ../../:/workspace
    depends_on:
      init:
        condition: service_completed_successfully
    command: >
      sh -c "npm ci"

  # ── Web apps ─────────────────────────────────────────────────────────────

  dispatcher-web:
    image: node:20-alpine
    working_dir: /workspace
    restart: unless-stopped
    environment:
      - NODE_ENV=development
    ports:
      - "4200:4200"
    volumes:
      - ../../:/workspace
    command: >
      sh -c "npx nx serve dispatcher-web --host 0.0.0.0 --port 4200"
    depends_on:
      init:
        condition: service_completed_successfully
      node-deps:
        condition: service_completed_successfully
      api:
        condition: service_started

  tracking-web:
    image: node:20-alpine
    working_dir: /workspace
    restart: unless-stopped
    environment:
      - NODE_ENV=development
    ports:
      - "4300:4300"
    volumes:
      - ../../:/workspace
    command: >
      sh -c "npx nx serve tracking-web --host 0.0.0.0 --port 4300"
    depends_on:
      init:
        condition: service_completed_successfully
      node-deps:
        condition: service_completed_successfully
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  mailpit_data:


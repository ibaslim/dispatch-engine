events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:8000;
  }

  upstream dispatcher_web {
    server dispatcher-web:4200;
  }

  upstream tracking_web {
    server tracking-web:4300;
  }

  server {
    listen 80;

    # API
    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket
    location /api/v1/ws {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # Dispatcher web (default)
    location / {
      proxy_pass http://dispatcher_web;
      proxy_set_header Host $host;
    }
  }

  server {
    listen 4300;
    location / {
      proxy_pass http://tracking_web;
      proxy_set_header Host $host;
    }
  }
}

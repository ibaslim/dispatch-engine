<section class="space-y-6">
    <div class="flex items-center gap-2">
        <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100">Order Details</h3>
        <span class="text-xs text-gray-400">(Optional)</span>
    </div>

    <div class="space-y-4">
        <div>
            <p class="text-xs text-gray-500 mb-2">Items:</p>

            <div class="grid grid-cols-12 gap-2">
                <div class="col-span-6">
                    <app-base-input [showLabel]="false" placeholder="Name" [value]="value.itemName"
                        (valueChange)="patch({ itemName: $event })"></app-base-input>
                </div>

                <div class="col-span-4">
                    <app-base-input [showLabel]="false" type="number" placeholder="Price" [value]="value.itemPrice"
                        (valueChange)="patch({ itemPrice: $event })"></app-base-input>
                </div>

                <div class="col-span-2">
                    <app-base-input [showLabel]="false" type="number" placeholder="qty" [value]="value.itemQty"
                        (valueChange)="patch({ itemQty: $event })"></app-base-input>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 items-end">
            <app-base-input label="Tax Rate %" placeholder="Enter tax rate" [value]="value.taxRate"
                (valueChange)="patch({ taxRate: $event })"></app-base-input>

            <div class="rounded-md border border-gray-200 dark:border-[#2a2d2a] px-4 py-3">
                <p class="text-xs text-gray-500">Subtotal (C$):</p>
                <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">{{ money(value.subtotal) }}</p>
            </div>
        </div>

        <div class="rounded-md border border-gray-200 dark:border-[#2a2d2a] px-4 py-3">
            <p class="text-xs text-gray-500">Tax (C$):</p>
            <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">{{ money(value.taxAmount) }}</p>
        </div>

        <app-base-input label="Delivery Fees (C$)" placeholder="Enter delivery fees" [value]="value.deliveryFees"
            (valueChange)="patch({ deliveryFees: $event })"></app-base-input>

        <app-base-input label="Delivery Tips (C$)" placeholder="Enter delivery tips amount" [value]="value.deliveryTips"
            (valueChange)="patch({ deliveryTips: $event })"></app-base-input>

        <app-base-input label="Discount (C$)" placeholder="Enter discount amount" [value]="value.discount"
            (valueChange)="patch({ discount: $event })"></app-base-input>

        <div class="rounded-md border border-gray-200 dark:border-[#2a2d2a] px-4 py-3">
            <p class="text-xs text-gray-500">Total (C$):</p>
            <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">{{ money(value.total) }}</p>
        </div>

        <app-textarea label="Delivery Instruction" placeholder="Enter delivery instructions"
            [value]="value.instructions" (valueChange)="patch({ instructions: $event })"></app-textarea>

        <app-base-input label="Payment Method" placeholder="" [value]="value.paymentMethod"
            (valueChange)="patch({ paymentMethod: $event })"></app-base-input>
    </div>
</section>

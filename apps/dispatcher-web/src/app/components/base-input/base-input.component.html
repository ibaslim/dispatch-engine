<label class="block w-full my-4">
    <div *ngIf="showLabel" class="flex items-center gap-1.5 mb-4">
        <span class="text-sm text-gray-600 dark:text-gray-200">{{ label }}</span>
        <span *ngIf="required" class="text-xs text-red-500">*</span>
    </div>

    <ng-container *ngIf="hasSuffix; else noSuffix">
        <div class="flex items-stretch gap-2">
            <input class="flex-1 h-10 px-3 py-2 rounded-md border border-gray-300 dark:border-[#5a5d5a]
        bg-white dark:bg-[#1E201E] text-sm text-gray-900 dark:text-gray-100" [type]="type" [placeholder]="placeholder"
                [disabled]="disabled" [required]="required" [pattern]="pattern" [min]="min" [max]="max" [step]="step"
                [attr.name]="getName()" [(ngModel)]="value" (ngModelChange)="onInputValue($event)" />
            <ng-content select="[suffix]"></ng-content>
        </div>
    </ng-container>

    <ng-template #noSuffix>
        <input class="w-full h-10 px-3 py-2 rounded-md border border-gray-300 dark:border-[#5a5d5a]
      bg-white dark:bg-[#1E201E] text-sm text-gray-900 dark:text-gray-100" [type]="type" [placeholder]="placeholder"
            [disabled]="disabled" [required]="required" [pattern]="pattern" [min]="min" [max]="max" [step]="step"
            [attr.name]="getName()" [(ngModel)]="value" (ngModelChange)="onInputValue($event)" />
    </ng-template>

    <app-error-message [show]="showError" [messages]="errorList">
    </app-error-message>
</label>

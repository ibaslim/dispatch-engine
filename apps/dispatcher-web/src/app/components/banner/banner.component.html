<div
    class="w-[600px] h-[260px] max-w-full rounded-2xl border border-gray-200 dark:border-[#2a2d2a] bg-white dark:bg-[#1E201E] px-8 py-8 shadow-lg text-center flex flex-col items-center justify-center">

    <div
        class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-slate-700 to-slate-900 shadow-lg ring-1 ring-white/10">
        <svg class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"
            stroke-linecap="round" stroke-linejoin="round">
            <!-- Head -->
            <circle cx="12" cy="8" r="3.5" />

            <!-- Shoulders / body -->
            <path d="M5 19c0-3.3 3.1-6 7-6s7 2.7 7 6" />

            <!-- Exclamation badge -->
            <circle cx="18.5" cy="5.5" r="2.5" />
            <line x1="18.5" y1="4.6" x2="18.5" y2="6.1" />
            <circle cx="18.5" cy="7.2" r="0.2" fill="currentColor" stroke="none" />
        </svg>
    </div>

    <h3 class="text-base sm:text-lg font-semibold text-gray-900 dark:text-gray-100">
        {{ title }}
    </h3>

    <p class="mt-2 text-sm sm:text-base text-gray-600 dark:text-gray-400">
        <ng-content></ng-content>
    </p>
</div>

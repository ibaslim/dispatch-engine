<div class="w-full">
    <div class="flex items-center gap-1 mb-1">
        <span class="text-xs text-gray-500">{{ label }}</span>
        <span *ngIf="required" class="text-xs text-red-500">*</span>
    </div>

    <select class="w-full px-3 py-2 rounded-md border border-gray-300 dark:border-[#2a2d2a]
           bg-white dark:bg-[#1E201E] text-sm text-gray-900 dark:text-gray-100
           focus:outline-none focus:ring-2 focus:ring-[#3ddc97]/30" [value]="value" [disabled]="disabled"
        (change)="onChange($event)">
        <option value="" disabled>{{ placeholder }}</option>

        <option *ngFor="let opt of options" [value]="opt.value">
            {{ opt.label }}
        </option>
    </select>
</div>

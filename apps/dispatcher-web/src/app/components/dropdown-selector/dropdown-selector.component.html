<div class="w-full" [class.my-4]="!dense">
    <div *ngIf="showLabel" class="flex items-center gap-1.5 mb-4">
        <span class="text-sm text-gray-600 dark:text-gray-200">{{ label }}</span>
        <span *ngIf="required" class="text-xs text-red-500">*</span>
    </div>

    <div class="relative">
        <span class="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 text-gray-400">
            ▾
        </span>

        <select class="w-full h-10 px-3 pr-7 rounded-md border border-gray-300 dark:border-[#5a5d5a]
           bg-white dark:bg-[#1E201E] text-sm text-gray-900 dark:text-gray-100
           focus:outline-none focus:ring-2 focus:ring-[#3ddc97]/30 appearance-none" [ngClass]="selectClass"
            [value]="value" [disabled]="disabled" [attr.name]="name" [attr.required]="required ? '' : null"
            (change)="onChange($event)">

            <option value="" disabled>{{ placeholder }}</option>

            <option *ngFor="let opt of options" [value]="opt.value">
                {{ opt.label }}
            </option>
        </select>
    </div>
</div>

<nav class="bg-gray-900 text-white shadow-lg sticky top-0 z-50">
    <div class="w-full px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">

            <!-- Logo and App Name -->
            <div class="flex items-center space-x-3">
                <div class="flex-shrink-0 w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                    D
                </div>
                <div class="hidden md:flex flex-col">
                    <span class="text-lg">{{ appName }}</span>
                    <span class="text-xs text-gray-400">{{ appTagline }}</span>
                </div>
            </div>

            <!-- Right Side Actions -->
            <div class="flex items-center space-x-4">

                <!-- Desktop Navigation Menu -->
                <div class="hidden md:flex space-x-1">
                    <a *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="bg-blue-600"
                        [routerLinkActiveOptions]="{ exact: false }"
                        class="px-3 py-2 rounded-md text-sm font-medium hover:text-[#91D06C] transition duration-200">
                        {{ item.label }}
                    </a>
                </div>

                <!-- Notification Button -->
                <app-button variant="icon" [icon]="notificationIcon" (onClick)="showNotification()"
                    extraClasses="p-2 rounded-md hover:bg-gray-700 transition duration-200" title="Notifications">
                </app-button>

                <!-- Help Button -->
                <app-button variant="icon" [icon]="helpIcon" (onClick)="showHelp()"
                    extraClasses="p-2 rounded-md hover:bg-gray-700 transition duration-200" title="Help">
                </app-button>

                <!-- Upgrade Button -->
                <app-button variant="primary" label="Upgrade" (onClick)="upgradePlan()" extraClasses="hidden lg:block">
                </app-button>

                <!-- User Profile Dropdown -->
                <user-dropdown-icon [userName]="auth.currentUser()?.name" [userEmail]="auth.currentUser()?.email"
                    (logout)="logout()">
                </user-dropdown-icon>

                <!-- Mobile Menu Toggle -->
                <app-button variant="icon" [icon]="menuIcon" (onClick)="toggleMobileMenu()"
                    extraClasses="md:hidden p-2 rounded-md hover:bg-gray-700 transition duration-200"
                    ariaLabel="Toggle menu">
                </app-button>

            </div>
        </div>

        <!-- Mobile Menu -->
        <div *ngIf="isMobileMenuOpen" class="md:hidden pb-4">
            <a *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="bg-blue-600"
                [routerLinkActiveOptions]="{ exact: false }"
                class="block px-3 py-2 rounded-md text-base font-medium hover:bg-gray-700 transition duration-200"
                (click)="onNavItemClick()">
                {{ item.label }}
            </a>
        </div>
    </div>
</nav>

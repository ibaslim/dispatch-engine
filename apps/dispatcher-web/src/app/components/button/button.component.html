<button (click)="onButtonClick()" [type]="type" [disabled]="disabled || loading" [class]="getButtonClasses()"
    [attr.aria-label]="ariaLabel">
    <!-- Icon Button -->
    <ng-container *ngIf="isIconButton() && icon?.length">
        <svg *ngIf="isFilledIcon(); else strokeIcon" class="w-5 h-5 text-gray-700 dark:text-gray-200"
            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor">
            <path [attr.d]="icon"></path>
        </svg>

        <ng-template #strokeIcon>
            <svg class="w-5 h-5 text-gray-700 dark:text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path [attr.d]="icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
        </ng-template>
    </ng-container>

    <!-- Icon button with custom content -->
    <ng-container *ngIf="isIconButton() && !icon?.length">
        <ng-content></ng-content>
    </ng-container>

    <!-- Text Button with Loading -->
    <ng-container *ngIf="!isIconButton()">
        <span *ngIf="!loading" class="flex items-center gap-3">
            <ng-content select="[data-icon]"></ng-content>
            <svg *ngIf="leadingIcon" [class]="leadingIconClass" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"
                fill="currentColor">
                <path [attr.d]="leadingIcon"></path>
            </svg>
            <span>{{ label }}</span>
        </span>
        <span *ngIf="loading" class="flex items-center gap-2">
            <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            Loading...
        </span>
    </ng-container>
</button>

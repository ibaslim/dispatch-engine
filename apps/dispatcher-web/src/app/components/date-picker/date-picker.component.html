<app-base-input [label]="label" type="date" [required]="required" [placeholder]="placeholder" [value]="value"
    (valueChange)="valueChange.emit($event)" [hasSuffix]="true">
    <app-button suffix variant="icon" type="button" ariaLabel="Open calendar"
        [extraClasses]="'!w-auto !h-auto !p-0 bg-transparent'">
        <span class="px-3 rounded-md border border-gray-300 dark:border-[#2a2d2a]
             hover:bg-gray-100 dark:hover:bg-[#2a2d2a] transition flex items-center">
            <i class="ph ph-calendar text-gray-700 dark:text-gray-200"></i>
        </span>
    </app-button>
</app-base-input>

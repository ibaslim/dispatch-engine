<app-base-input [label]="label" type="date" [required]="required" [name]="name" [placeholder]="placeholder"
    [value]="value" (valueChange)="valueChange.emit($event)" [hasSuffix]="true">
    <app-button suffix variant="icon" type="button" ariaLabel="Open calendar"
        [extraClasses]="'!w-auto !h-auto !p-0 bg-transparent'">
    </app-button>
</app-base-input>

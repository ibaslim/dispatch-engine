<div class="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-[#131313] p-5 shadow-sm transition
         hover:border-emerald-500/40 hover:bg-emerald-50/40 dark:hover:bg-[#151a18]"
    [ngClass]="active ? 'border-emerald-500/60 bg-emerald-50/60 dark:bg-[#14241f]' : ''">

    <div class="mb-4 flex h-10 w-10 items-center justify-center rounded-lg bg-emerald-100 dark:bg-emerald-900/40">
        <i class="ph {{ icon }} text-emerald-600 dark:text-emerald-300 text-lg"></i>
    </div>

    <h3 class="text-base font-semibold text-gray-900 dark:text-white">
        {{ title }}
    </h3>
    <p class="mt-1 text-sm text-gray-600 dark:text-gray-400">
        {{ description }}
    </p>
</div>

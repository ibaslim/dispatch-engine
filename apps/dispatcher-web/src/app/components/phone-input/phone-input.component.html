<div class="w-full">
    <div class="flex items-center gap-1 mb-2">
        <span class="text-xs text-gray-500">{{ label }}</span>
        <span *ngIf="required" class="text-xs text-red-500">*</span>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-12 gap-2">
        <input class="sm:col-span-3 h-10 px-3 py-2 rounded-md border border-gray-300 dark:border-[#2a2d2a]
             bg-white dark:bg-[#1E201E] text-sm text-gray-900 dark:text-gray-100
             placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-[#3ddc97]/30" placeholder="+1"
            [value]="value.countryCode" (input)="onCountryCode($event)" />

        <input class="sm:col-span-9 h-10 px-3 py-2 rounded-md border border-gray-300 dark:border-[#2a2d2a]
             bg-white dark:bg-[#1E201E] text-sm text-gray-900 dark:text-gray-100
             placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-[#3ddc97]/30"
            placeholder="(000) 000-0000" [value]="value.number" (input)="onNumber($event)" />
    </div>
</div>

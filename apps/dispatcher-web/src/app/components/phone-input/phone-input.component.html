<div class="w-full">
    <div class="flex items-center gap-1.5 mb-4">
        <span class="text-sm text-gray-600 dark:text-gray-200">{{ label }}</span>
        <span *ngIf="required" class="text-xs text-red-500">*</span>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-12 gap-3">
        <div class="sm:col-span-3">
            <input class="w-full h-10 px-3 py-2 rounded-md border border-gray-300 dark:border-[#5a5d5a]
               bg-white dark:bg-[#1E201E] text-sm text-gray-900 dark:text-gray-100
               placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-[#3ddc97]/30" placeholder="+1"
                [required]="required" pattern="^\+?\d{1,4}$" name="countryCode" [ngModel]="value.countryCode"
                (ngModelChange)="onCountryCode($event)" #cc="ngModel" />
            <app-error-message [show]="cc.invalid && (cc.touched || cc.dirty)" [messages]="[
          cc.errors?.['required'] ? 'Country code is required.' : '',
          cc.errors?.['pattern'] ? 'Invalid country code.' : ''
        ]"></app-error-message>
        </div>

        <div class="sm:col-span-9">
            <input class="w-full h-10 px-3 py-2 rounded-md border border-gray-300 dark:border-[#5a5d5a]
               bg-white dark:bg-[#1E201E] text-sm text-gray-900 dark:text-gray-100
               placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-[#3ddc97]/30"
                placeholder="(000) 000-0000" [required]="required" pattern="^[0-9()\s\-]{7,}$" name="phoneNumber"
                [ngModel]="value.number" (ngModelChange)="onNumber($event)" #num="ngModel" />
            <app-error-message [show]="num.invalid && (num.touched || num.dirty)" [messages]="[
          num.errors?.['required'] ? 'Phone number is required.' : '',
          num.errors?.['pattern'] ? 'Invalid phone number.' : ''
        ]"></app-error-message>
        </div>
    </div>
</div>

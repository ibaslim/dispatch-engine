<div class="w-full">
    <div class="flex items-center gap-1.5 mb-4">
        <span class="text-sm text-gray-600 dark:text-gray-200">{{ label }}</span>
        <span *ngIf="required" class="text-xs text-red-500">*</span>
    </div>

    <div class="flex gap-3">

        <!-- Country Code -->
        <div class="w-[110px] flex-shrink-0">
            <app-dropdown-selector [showLabel]="false" [dense]="true" name="countryCode" [required]="required"
                [options]="countryOptions" [value]="value.countryCode" (valueChange)="onCountryCode($event)">
            </app-dropdown-selector>
        </div>

        <!-- Phone Number -->
        <div class="flex-1">
            <input class="w-full h-10 px-3 py-2 rounded-md border border-gray-300 dark:border-[#5a5d5a]
        bg-white dark:bg-[#1E201E] text-sm text-gray-900 dark:text-gray-100
        placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-[#3ddc97]/30" placeholder="4165551234"
                inputmode="numeric" [required]="required" name="phoneNumber" [value]="value.number"
                (input)="onNumber($event.target.value)" />

            <app-error-message [show]="showNumberError" [messages]="numberErrors">
            </app-error-message>
        </div>

    </div>
</div>

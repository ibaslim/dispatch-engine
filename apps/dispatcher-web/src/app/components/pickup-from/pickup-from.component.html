<section>
    <h3 class="text-sm font-semibold mb-4 text-gray-900 dark:text-gray-100">Pick-up From:</h3>

    <div class="space-y-4">
        <app-base-input label="Name" placeholder="Enter store name" [required]="true" [value]="value.name"
            (valueChange)="patch({ name: $event })"></app-base-input>

        <app-phone-input label="Phone No." [required]="true" [value]="value.phone"
            (valueChange)="patch({ phone: $event })"></app-phone-input>

        <app-address-input label="Address" placeholder="Enter a location" [required]="true" [value]="value.address"
            (valueChange)="patch({ address: $event })" (pinClick)="pinClick.emit()"></app-address-input>

        <app-base-input label="Pickup Time" type="time" [required]="true" [value]="value.pickupTime"
            (valueChange)="patch({ pickupTime: $event })"></app-base-input>
    </div>
</section>

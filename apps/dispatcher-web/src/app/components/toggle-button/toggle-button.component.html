<app-button variant="icon" (onClick)="toggle()" [extraClasses]="
    'w-10 h-5 p-0 flex items-center rounded-full transition ' +
    (value ? 'bg-green-500' : 'bg-gray-300')
  ">
    <div class="bg-white w-4 h-4 rounded-full shadow transform transition" [class.translate-x-5]="value"></div>
</app-button>

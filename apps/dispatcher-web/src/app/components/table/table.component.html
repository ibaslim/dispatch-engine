<div
    class="w-full border-t border-gray-200 dark:border-[#2a2d2a] bg-white dark:bg-[#1E201E] text-gray-800 dark:text-gray-200">

    <!-- Header -->
    <div class="grid items-center gap-4 px-4 py-3 text-[11px] uppercase tracking-wide text-gray-500 dark:text-gray-400"
        [style.gridTemplateColumns]="columnTemplate ? columnTemplate : ('repeat(' + columns.length + ', minmax(0, 1fr))')">
        <div *ngFor="let col of columns" class="flex items-center gap-2">
            <span>{{ col.label }}</span>
            <svg *ngIf="col.sortable" class="w-3 h-3 text-gray-400 dark:text-gray-500" viewBox="0 0 256 256"
                fill="currentColor">
                <path d="M128 40l48 48H80zM128 216l-48-48h96z"></path>
            </svg>
        </div>
    </div>

    <div class="border-t border-gray-200 dark:border-[#2a2d2a]"></div>

    <!-- Rows -->
    <div *ngIf="rows.length > 0" class="divide-y divide-gray-200 dark:divide-[#2a2d2a]">
        <div *ngFor="let row of rows" class="grid items-center gap-4 px-4 py-3 text-sm"
            [style.gridTemplateColumns]="columnTemplate ? columnTemplate : ('repeat(' + columns.length + ', minmax(0, 1fr))')">
            <div *ngFor="let col of columns">
                <ng-container *ngIf="col.key === 'select'; else checkAction">
                    <input type="checkbox" class="h-4 w-4 accent-[#3ddc97]" />
                </ng-container>

                <ng-template #checkAction>
                    <ng-container *ngIf="col.key === 'actions'; else defaultCell">
                        <div class="flex justify-end pr-2 text-gray-400 hover:text-gray-200 cursor-pointer">
                            <span class="text-lg leading-none">⋯</span>
                        </div>
                    </ng-container>
                </ng-template>

                <ng-template #defaultCell>
                    {{ row[col.key] }}
                </ng-template>
            </div>
        </div>
    </div>

    <!-- Empty -->
    <div *ngIf="rows.length === 0"
        class="py-24 flex flex-col items-center text-center text-gray-500 dark:text-gray-400">
        <div class="w-12 h-12 rounded-full bg-green-100 dark:bg-[#143628] flex items-center justify-center mb-3">
            <svg class="w-6 h-6 text-[#3ddc97]" viewBox="0 0 256 256" fill="currentColor">
                <path
                    d="M208 40H64a16 16 0 00-16 16v144a16 16 0 0016 16h144a16 16 0 0016-16V56a16 16 0 00-16-16zm0 160H64V56h144zM96 104h64a8 8 0 010 16H96a8 8 0 010-16zm0 32h64a8 8 0 010 16H96a8 8 0 010-16z">
                </path>
            </svg>
        </div>
        <div class="text-sm">{{ emptyTitle }}</div>
        <div *ngIf="emptySubtitle" class="text-xs text-gray-400 dark:text-gray-500 mt-1">{{ emptySubtitle }}</div>
    </div>
</div>

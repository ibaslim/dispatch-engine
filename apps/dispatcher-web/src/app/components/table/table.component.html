<div
    class="w-full border-t border-gray-200 dark:border-[#2a2d2a] bg-white dark:bg-[#1E201E] text-gray-800 dark:text-gray-200">

    <!-- HEADER -->
    <div class="grid items-center gap-4 px-4 py-3 text-[11px] uppercase tracking-wide text-gray-500 dark:text-gray-400"
        [style.gridTemplateColumns]="columnTemplate ? columnTemplate : ('repeat(' + columns.length + ', minmax(0, 1fr))')">
        <div *ngFor="let col of columns" class="flex items-center justify-center gap-2 w-full text-center">
            <span>{{ col.label }}</span>

            <svg *ngIf="col.sortable" class="w-3 h-3 text-gray-400 dark:text-gray-500" viewBox="0 0 256 256"
                fill="currentColor">
                <path d="M128 40l48 48H80zM128 216l-48-48h96z"></path>
            </svg>
        </div>
    </div>

    <div class="border-t border-gray-200 dark:border-[#2a2d2a]"></div>

    <!-- ROWS -->
    <div *ngIf="rows.length > 0" class="divide-y divide-gray-200 dark:divide-[#2a2d2a]">

        <div *ngFor="let row of rows" class="grid items-center gap-4 px-4 py-3 text-sm"
            [style.gridTemplateColumns]="columnTemplate ? columnTemplate : ('repeat(' + columns.length + ', minmax(0, 1fr))')">

            <div *ngFor="let col of columns" class="flex items-center justify-center w-full">

                <ng-container [ngSwitch]="col.key">

                    <!-- SELECT -->
                    <ng-container *ngSwitchCase="'select'">
                        <input type="checkbox" class="h-4 w-4 accent-[#3ddc97]" />
                    </ng-container>

                    <!-- READY FOR PICKUP TOGGLE -->
                    <ng-container *ngSwitchCase="'readyForPickup'">
                        <app-toggle-button [value]="row.readyForPickup"
                            (valueChange)="readyForPickupChange.emit({ id: row.id, value: $event })">
                        </app-toggle-button>
                    </ng-container>

                    <!-- DRIVER COLUMN -->
                    <ng-container *ngSwitchCase="'driver'">
                        <div class="flex items-center justify-center w-full">

                            <span *ngIf="row.driver; else assignBtn">
                                {{ row.driver }}
                            </span>

                            <ng-template #assignBtn>
                                <app-button variant="ghost-outline" label="+ Assign"
                                    (onClick)="onAssignClick(row, $event)"></app-button>
                            </ng-template>

                        </div>
                    </ng-container>

                    <!-- ACTIONS -->
                    <ng-container *ngSwitchCase="'actions'">
                        <div class="relative flex justify-center w-full">

                            <app-button variant="icon"
                                class="row-action-button group rounded-md hover:bg-gray-100 dark:hover:bg-[#2a2d2a] transition"
                                (onClick)="onActionClick(row, $event)" ariaLabel="Row actions">
                                <i
                                    class="ph ph-dots-three text-xl text-gray-900 dark:text-gray-200 transition-transform duration-150 group-hover:scale-125"></i>
                            </app-button>

                            <app-menu [items]="menuItems" [visible]="activeMenuRow?.id === row.id"
                                (select)="menuSelect.emit({ item: $event, row })">
                            </app-menu>

                        </div>
                    </ng-container>

                    <!-- NAME -->
                    <ng-container *ngSwitchCase="'name'">
                        <div class="flex items-center justify-center gap-3 w-full">
                            <div
                                class="w-7 h-7 rounded-full bg-gray-300 dark:bg-[#3a3a3a] text-gray-800 dark:text-gray-100 text-xs flex items-center justify-center font-semibold">
                                {{ getInitials(row.name) }}
                            </div>
                            <span>{{ row.name }}</span>
                        </div>
                    </ng-container>

                    <!-- DEFAULT -->
                    <ng-container *ngSwitchDefault>
                        {{ row[col.key] }}
                    </ng-container>

                </ng-container>

            </div>
        </div>

    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="rows.length === 0"
        class="py-24 flex flex-col items-center text-center text-gray-500 dark:text-gray-400">
        <div class="w-12 h-12 rounded-full bg-green-100 dark:bg-[#143628] flex items-center justify-center mb-3">
            <svg class="w-6 h-6 text-[#3ddc97]" viewBox="0 0 256 256" fill="currentColor">
                <path
                    d="M208 40H64a16 16 0 00-16 16v144a16 16 0 0016 16h144a16 16 0 0016-16V56a16 16 0 00-16-16zm0 160H64V56h144zM96 104h64a8 8 0 010 16H96a8 0 010-16zm0 32h64a8 8 0 010 16H96a8 0 010-16z">
                </path>
            </svg>
        </div>

        <div class="text-sm">{{ emptyTitle }}</div>

        <div *ngIf="emptySubtitle" class="text-xs text-gray-400 dark:text-gray-500 mt-1">
            {{ emptySubtitle }}
        </div>
    </div>

</div>

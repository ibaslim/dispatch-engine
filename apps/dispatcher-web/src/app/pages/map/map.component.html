<app-page title="" titleClass="hidden"
    containerClass="w-full p-0 bg-white dark:bg-[#0f0f0f] text-gray-900 dark:text-gray-100 min-h-[calc(100vh-4rem)]"
    contentClass="w-full h-[calc(100vh-4rem)]">

    <div class="relative w-full h-[calc(100vh-4rem)]">
        <!-- TOP TOOLBAR ONLY -->
        <div class="absolute top-4 left-1/2 -translate-x-1/2 z-10
             flex items-center gap-2
             bg-white/95 dark:bg-[#121212]/90
             border border-gray-200 dark:border-[#2a2a2a]
             rounded-xl px-4 py-2 backdrop-blur">

            <div
                class="flex items-center gap-2 bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-[#2a2a2a] rounded-lg px-3 py-2 min-w-[260px]">
                <i class="ph ph-magnifying-glass text-gray-500 dark:text-gray-400"></i>
                <input type="text" placeholder="Search orders, drivers..."
                    class="bg-transparent outline-none text-sm text-gray-800 dark:text-gray-200 placeholder:text-gray-400 dark:placeholder:text-gray-500 w-full">
            </div>

            <app-button variant="ghost" ariaLabel="All dates" label="All dates"
                [extraClasses]="'border border-gray-200 dark:border-[#2a2a2a] text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg text-sm hover:bg-gray-100 dark:hover:bg-[#1a1a1a] flex items-center gap-2'">
                <i data-icon class="ph ph-calendar-blank text-base"></i>
            </app-button>

            <app-button variant="ghost" ariaLabel="All day" label="All day"
                [extraClasses]="'border border-gray-200 dark:border-[#2a2a2a] text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg text-sm hover:bg-gray-100 dark:hover:bg-[#1a1a1a] flex items-center gap-2'">
                <i data-icon class="ph ph-clock text-base"></i>
            </app-button>

            <app-button variant="ghost" ariaLabel="All orders" label="All orders"
                [extraClasses]="'border border-gray-200 dark:border-[#2a2a2a] text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg text-sm hover:bg-gray-100 dark:hover:bg-[#1a1a1a] flex items-center gap-2'">
                <i data-icon class="ph ph-clipboard-text text-base"></i>
            </app-button>

            <app-button variant="ghost" ariaLabel="Filters" label="Filters"
                [extraClasses]="'border border-gray-200 dark:border-[#2a2a2a] text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg text-sm hover:bg-gray-100 dark:hover:bg-[#1a1a1a] flex items-center gap-2'">
                <i data-icon class="ph ph-faders-horizontal text-base"></i>
            </app-button>

            <app-button variant="ghost" ariaLabel="New Order" label="New Order"
                [extraClasses]="'bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-emerald-400 flex items-center gap-2'">
                <i data-icon class="ph ph-plus text-base"></i>
            </app-button>
        </div>

        <!-- MAP CONTAINER -->
        <div id="map" class="w-full h-full"></div>
    </div>
</app-page>

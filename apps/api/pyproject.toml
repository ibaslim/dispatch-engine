[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["app"]
omit = ["app/cli/*", "alembic/*"]

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
